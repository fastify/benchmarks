version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    groups:
      adonisjs:
        patterns:
          - "@adonisjs/*"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
